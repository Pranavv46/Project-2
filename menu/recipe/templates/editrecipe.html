{% extends 'base.html' %}

{% block title %}
Edit Recipe
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-warning">
                <h3>Edit Recipe</h3>
            </div>

            <div class="card-body">

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>

                        <select name="category" class="form-select">

                            <option value="Indian" {% if recipe.category == "Indian" %}selected{% endif %}>Indian</option>

                            <option value="Italian" {% if recipe.category == "Italian" %}selected{% endif %}>Italian</option>

                            <option value="Fast Food" {% if recipe.category == "Fast Food" %}selected{% endif %}>Fast Food</option>

                            <option value="Dessert" {% if recipe.category == "Dessert" %}selected{% endif %}>Dessert</option>

                            <option value="Salad" {% if recipe.category == "Salad" %}selected{% endif %}>Salad</option>

                            <option value="Mandi" {% if recipe.category == "Mandi" %}selected{% endif %}>Mandi</option>

                            <option value="Drinks" {% if recipe.category == "Drinks" %}selected{% endif %}>Drinks</option>

                        </select>
                    </div>

                    <!-- Title -->
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text"
                               name="title"
                               class="form-control"
                               value="{{ recipe.title }}">
                    </div>

                    <!-- Ingredients -->
                    <div class="mb-3">
                        <label class="form-label">Ingredients</label>
                        <textarea name="ingredients"
                                  class="form-control"
                                  rows="4">{{ recipe.ingredients }}</textarea>
                    </div>

                    <!-- Instructions -->
                    <div class="mb-3">
                        <label class="form-label">Instructions</label>
                        <textarea name="instructions"
                                  class="form-control"
                                  rows="6">{{ recipe.instructions }}</textarea>
                    </div>

                    {% if recipe.image %}
                    <div class="mb-3">
                        <label class="form-label">Current Image</label><br>

                        <img src="{{ recipe.image.url }}"
                             alt="{{ recipe.title }}"
                             class="img-thumbnail"
                             style="max-width:250px;">
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Change Image</label>
                        <input type="file"
                               name="image"
                               class="form-control">
                    </div>

                    <button type="submit" class="btn btn-warning">
                        Update Recipe
                    </button>

                    <a href="{% url 'recipe_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
