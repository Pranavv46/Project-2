{% extends 'base.html' %}

{% block title %}
Edit Recipe
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header bg-warning">
                <h3>Edit Recipe</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text"
                               name="title"
                               class="form-control"
                               value="{{ recipe.title }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ingredients</label>
                        <textarea name="ingredients"
                                  class="form-control"
                                  rows="4">{{ recipe.ingredients }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Instructions</label>
                        <textarea name="instructions"
                                  class="form-control"
                                  rows="6">{{ recipe.instructions }}</textarea>
                    </div>

                    <button type="submit" class="btn btn-warning">
                        Update Recipe
                    </button>

                    <a href="{% url 'recipe_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
