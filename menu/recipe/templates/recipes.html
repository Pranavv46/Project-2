{% extends 'base.html' %}

{% block title %}
Recipe List
{% endblock %}

{% block content %}

<h1 class="mb-4">Recipe List</h1>

{% for recipe in recipes %}

<div class="card mb-3">
    <div class="card-body">

        <h3 class="card-title">{{ recipe.title }}</h3>

        <p><strong>Ingredients:</strong></p>
        <p>{{ recipe.ingredients }}</p>

        <p><strong>Instructions:</strong></p>
        <p>{{ recipe.instructions }}</p>

        <a href="{% url 'recipe_detail' recipe.id %}" class="btn btn-primary btn-sm">
            View
        </a>

        <a href="{% url 'edit_recipe' recipe.id %}" class="btn btn-warning btn-sm">
            Edit
        </a>

        <a href="{% url 'delete_recipe' recipe.id %}"
           class="btn btn-danger btn-sm">
            Delete
        </a>

    </div>
</div>

{% endfor %}

{% endblock %}
